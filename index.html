<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon GO — Great League Rankings</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== THEME VARIABLES ===== */
[data-theme="dark"] {
  --bg: #0d0f1a; --surface: #161928; --surface2: #1e2235; --border: #2a2f47;
  --text: #e8eaf6; --text2: #9fa8da; --muted: #5c6bc0; --accent: #ffd740;
  --score-high: #69f0ae; --score-mid: #40c4ff; --score-low: #ea80fc;
  --card-hover-shadow: rgba(255,215,64,0.12);
  --header-bg: linear-gradient(135deg, #1a1f3a 0%, #0d0f1a 60%);
  --input-bg: #1e2235;
}
[data-theme="light"] {
  --bg: #f0f2ff; --surface: #ffffff; --surface2: #e8ecff; --border: #c5cae9;
  --text: #1a237e; --text2: #3949ab; --muted: #5c6bc0; --accent: #e65100;
  --score-high: #2e7d32; --score-mid: #1565c0; --score-low: #6a1b9a;
  --card-hover-shadow: rgba(230,81,0,0.12);
  --header-bg: linear-gradient(135deg, #c5cae9 0%, #e8eaf6 60%);
  --input-bg: #ffffff;
}
[data-theme="auto"] {
  --bg: #1a1a2e; --surface: #16213e; --surface2: #0f3460; --border: #1e3a5f;
  --text: #e2e2e2; --text2: #a8c6fa; --muted: #6fa3ef; --accent: #e94560;
  --score-high: #00b4d8; --score-mid: #90e0ef; --score-low: #f72585;
  --card-hover-shadow: rgba(233,69,96,0.15);
  --header-bg: linear-gradient(135deg, #0f3460 0%, #1a1a2e 60%);
  --input-bg: #16213e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}

/* ===== HEADER ===== */
header {
  background: var(--header-bg);
  border-bottom: 2px solid var(--accent);
  padding: 22px 24px 16px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 30px rgba(0,0,0,0.4);
}

header h1 {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(9px, 1.6vw, 16px);
  color: var(--accent);
  letter-spacing: 1px;
  text-shadow: 0 0 20px rgba(255,215,64,0.35);
  line-height: 1.7;
}

.header-sub {
  margin-top: 6px;
  color: var(--muted);
  font-size: 12px;
  letter-spacing: 0.5px;
}

/* ===== THEME SWITCHER ===== */
.theme-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
}

.theme-label {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.4px;
}

.theme-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 11px;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.theme-btn:hover { border-color: var(--accent); color: var(--text); }
.theme-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

/* ===== CONTROLS ===== */
.controls {
  max-width: 920px;
  margin: 14px auto 0;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 0 16px;
  align-items: center;
}

.controls input[type="text"] {
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 7px 13px;
  font-size: 13px;
  font-family: 'Inter', sans-serif;
  outline: none;
  flex: 1;
  min-width: 180px;
  transition: border-color 0.2s;
}
.controls input[type="text"]:focus { border-color: var(--accent); }
.controls input[type="text"]::placeholder { color: var(--muted); }

.controls select {
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 7px 10px;
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s;
}
.controls select:focus { border-color: var(--accent); }

.count-badge {
  font-size: 11px;
  color: var(--muted);
  padding: 4px 10px;
  background: var(--surface2);
  border-radius: 20px;
  border: 1px solid var(--border);
  white-space: nowrap;
}

/* ===== LIST ===== */
.list {
  max-width: 920px;
  margin: 16px auto 60px;
  padding: 0 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ===== CARD ===== */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 11px;
  display: grid;
  grid-template-columns: 52px 96px 1fr auto;
  align-items: center;
  overflow: hidden;
  transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
}
.card:hover {
  transform: translateX(5px);
  border-color: var(--accent);
  box-shadow: 0 0 18px var(--card-hover-shadow);
}
.card.shadow-mon { border-left: 3px solid #9575cd; }

/* Rank */
.rank {
  display: flex; align-items: center; justify-content: center;
  height: 100%; min-height: 76px;
  background: var(--surface2);
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  color: var(--muted);
  border-right: 1px solid var(--border);
  padding: 0 4px;
  text-align: center;
  line-height: 1.6;
}
.rank.r1 { color: #ffd700; text-shadow: 0 0 8px rgba(255,215,0,0.5); }
.rank.r2 { color: #c0c0c0; }
.rank.r3 { color: #cd7f32; }
.rank.rtop10 { color: var(--score-high); }
.rank.rtop30 { color: var(--score-mid); }
.rank.rtop100 { color: var(--score-low); }

/* Sprite */
.sprite-wrap {
  display: flex; align-items: center; justify-content: center;
  padding: 4px 2px;
  height: 96px;
  background: radial-gradient(circle, rgba(255,255,255,0.025) 0%, transparent 70%);
}
.sprite-wrap img {
  width: 96px;
  height: 96px;
  image-rendering: pixelated;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.45));
  transition: transform 0.2s;
}
.card:hover .sprite-wrap img { transform: scale(1.08); }

/* Info */
.info {
  padding: 9px 13px;
  display: flex; flex-direction: column; gap: 5px;
  min-width: 0;
}

.name-row {
  display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
}
.poke-name {
  font-weight: 700; font-size: 15px; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.shadow-badge {
  font-size: 9px; background: rgba(149,117,205,0.18);
  border: 1px solid #9575cd; color: #b39ddb;
  border-radius: 4px; padding: 1px 5px; white-space: nowrap;
}
.dex-num { font-size: 11px; color: var(--muted); }

.types { display: flex; gap: 4px; flex-wrap: wrap; }
.type-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.4px;
  padding: 2px 7px; border-radius: 20px;
  text-transform: uppercase; color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}

.moves {
  display: flex; gap: 5px; flex-wrap: wrap; align-items: center;
}
.move-label { font-size: 10px; color: var(--muted); }
.move {
  font-size: 11px; font-weight: 500;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 4px; padding: 2px 6px; color: var(--text2);
  white-space: nowrap;
}
.move.cd { border-color: var(--accent); color: var(--accent); }

/* Score */
.score-col {
  padding: 10px 16px 10px 8px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  min-width: 62px;
}
.score-val {
  font-family: 'Press Start 2P', monospace;
  font-size: 12px; line-height: 1;
}
.sc-high { color: var(--score-high); }
.sc-mid  { color: var(--score-mid); }
.sc-low  { color: var(--score-low); }
.sc-vlow { color: var(--muted); }
.score-lbl { font-size: 8px; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }

/* Type Colors */
.t-normal{background:#A8A878} .t-fire{background:#F08030} .t-water{background:#6890F0}
.t-electric{background:#c8a800} .t-grass{background:#4a9e30} .t-ice{background:#60b8b8}
.t-fighting{background:#B02020} .t-poison{background:#8030A0} .t-ground{background:#b89030}
.t-flying{background:#7870c8} .t-psychic{background:#D84878} .t-bug{background:#8a9818}
.t-rock{background:#988028} .t-ghost{background:#604878} .t-dragon{background:#5020e0}
.t-dark{background:#604838} .t-steel{background:#8888A0} .t-fairy{background:#d06090}

/* Empty state */
.empty {
  text-align: center; padding: 60px 20px;
  color: var(--muted); font-size: 14px;
}

@media (max-width: 600px) {
  .card { grid-template-columns: 40px 72px 1fr auto; }
  .sprite-wrap img { width: 72px; height: 72px; }
  .sprite-wrap { height: 80px; }
  .rank { font-size: 8px; }
  .poke-name { font-size: 13px; }
  .score-val { font-size: 10px; }
  .score-col { padding: 8px 10px 8px 4px; }
}
</style>
</head>

function setTheme(t, btn) {
  document.body.setAttribute('data-theme', t);
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function isCommunity(m) { return m && m.endsWith('*'); }
function cleanMove(m) { return m ? m.replace(/\*$/, '').replace(/<[^>]*>/g,'') : '—'; }
function isShadow(n) { return n.includes('(Shadow)'); }

function scoreClass(s) {
  if (s >= 90) return 'sc-high';
  if (s >= 80) return 'sc-mid';
  if (s >= 60) return 'sc-low';
  return 'sc-vlow';
}

function rankClass(r) {
  if (r === 1) return 'r1';
  if (r === 2) return 'r2';
  if (r === 3) return 'r3';
  if (r <= 10) return 'rtop10';
  if (r <= 30) return 'rtop30';
  if (r <= 100) return 'rtop100';
  return '';
}

function typeBadge(t) {
  if (!t || t === 'none') return '';
  const em = TYPE_EMOJI[t] || '';
  return `<span class="type-badge t-${t}">${em} ${t}</span>`;
}

function moveBadge(m) {
  const cd = isCommunity(m);
  return `<span class="move${cd?' cd':''}">${cleanMove(m)}${cd?' ★':''}</span>`;
}

function buildCard(row, rank) {
  const [name, score, dex, t1, t2, fast, ch1, ch2] = row;
  const shadow = isShadow(name);
  const displayName = name.replace(' (Shadow)', '');
  const dexStr = String(dex).padStart(4,'0');
  return `
  <div class="card${shadow?' shadow-mon':''}"
    data-name="${name.toLowerCase()}"
    data-t1="${t1}" data-t2="${t2}"
    data-shadow="${shadow?'shadow':'normal'}">
    <div class="rank ${rankClass(rank)}">#${rank}</div>
    <div class="sprite-wrap">
      <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${dex}.png"
        alt="${name}" loading="lazy"
        onerror="this.style.opacity='0.3'">
    </div>
    <div class="info">
      <div class="name-row">
        <span class="poke-name">${displayName}</span>
        ${shadow?'<span class="shadow-badge">SHADOW</span>':''}
        <span class="dex-num">#${dexStr}</span>
      </div>
      <div class="types">
        ${typeBadge(t1)}
        ${t2!=='none'?typeBadge(t2):''}
      </div>
      <div class="moves">
        <span class="move-label">Fast:</span>${moveBadge(fast)}
        <span class="move-label">Charged:</span>${moveBadge(ch1)} ${moveBadge(ch2)}
      </div>
    </div>
    <div class="score-col">
      <span class="score-val ${scoreClass(score)}">${score}</span>
      <span class="score-lbl">Score</span>
    </div>
  </div>`;
}

// Populate type filter
const allTypes = [...new Set(DATA.flatMap(r => [r[3], r[4]]).filter(t => t && t !== 'none'))].sort();
const tf = document.getElementById('typeFilter');
allTypes.forEach(t => {
  const o = document.createElement('option');
  o.value = t; o.textContent = (TYPE_EMOJI[t]||'') + ' ' + t;
  tf.appendChild(o);
});

let visible = DATA.map((r,i) => i);

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const typeF = document.getElementById('typeFilter').value;
  const shadowF = document.getElementById('shadowFilter').value;
  
  visible = [];
  DATA.forEach((row, i) => {
    const [name,,,t1,t2] = row;
    if (q && !name.toLowerCase().includes(q) && !t1.includes(q) && !t2.includes(q)) return;
    if (typeF && t1 !== typeF && t2 !== typeF) return;
    if (shadowF === 'shadow' && !name.includes('(Shadow)')) return;
    if (shadowF === 'normal' && name.includes('(Shadow)')) return;
    visible.push(i);
  });

  renderList();
}

function renderList() {
  const listEl = document.getElementById('list');
  if (visible.length === 0) {
    listEl.innerHTML = '<div class="empty">🔎 ไม่พบโปเกมอนที่ตรงกัน</div>';
    document.getElementById('countBadge').textContent = '0 ตัว';
    return;
  }
  listEl.innerHTML = visible.map((idx, i) => buildCard(DATA[idx], idx + 1)).join('');
  document.getElementById('countBadge').textContent = `${visible.length} ตัว`;
}

// Initial render
visible = DATA.map((_, i) => i);
renderList();

// Event listeners
document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('typeFilter').addEventListener('change', applyFilters);
</script>
